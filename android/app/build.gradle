plugins {
    id "com.android.application"
    id "kotlin-android"
    id "kotlin-parcelize"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def localFastRelease = (project.findProperty("localFastRelease")?.toString() ?: "false").toBoolean()

def keyPropertiesFile = rootProject.file("key.properties")
def keyProperties = new java.util.Properties()
if (keyPropertiesFile.exists()) {
    keyProperties.load(new java.io.FileInputStream(keyPropertiesFile))
}

def isReleaseTask = gradle.startParameter.taskNames.any { task ->
    task.toLowerCase().contains("release")
}

def admobAppId = project.findProperty("ADMOB_APP_ID")?.toString()?.trim()
        ?: keyProperties["ADMOB_APP_ID"]?.toString()?.trim()
        ?: keyProperties["admobAppId"]?.toString()?.trim()

def kakaoNativeAppKey = project.findProperty("KAKAO_NATIVE_APP_KEY")?.toString()?.trim()
        ?: keyProperties["KAKAO_NATIVE_APP_KEY"]?.toString()?.trim()
        ?: ""
if (!isReleaseTask && (admobAppId == null || admobAppId.trim().isEmpty())) {
    admobAppId = "ca-app-pub-3940256099942544~3347511713"
}

def releaseSigningConfig = [
    storeFile: (project.findProperty("STORE_FILE")
            ?: keyProperties["storeFile"]
            ?: keyProperties["STORE_FILE"])?.toString()?.trim(),
    storePassword: (project.findProperty("STORE_PASSWORD")
            ?: keyProperties["storePassword"]
            ?: keyProperties["STORE_PASSWORD"])?.toString()?.trim(),
    keyAlias: (project.findProperty("KEY_ALIAS")
            ?: keyProperties["keyAlias"]
            ?: keyProperties["KEY_ALIAS"])?.toString()?.trim(),
    keyPassword: (project.findProperty("KEY_PASSWORD")
            ?: keyProperties["keyPassword"]
            ?: keyProperties["KEY_PASSWORD"])?.toString()?.trim(),
]
if (isReleaseTask && (admobAppId == null || admobAppId.trim().isEmpty())) {
    throw new GradleException("лҰҙлҰ¬мҰҲ л№Ңл“ң requires ADMOB_APP_ID to be set (gradle property or android/key.properties).")
}
if (isReleaseTask) {
    releaseSigningConfig.each { prop, value ->
        if (value == null || value.trim().isEmpty()) {
            throw new GradleException("лҰҙлҰ¬мҰҲ л№Ңл“ң requires ${prop} (gradle property or android/key.properties).")
        }
    }
}

android {
    namespace = "com.devground.daegubus"
    // Android 16 Live Updates м§Җмӣҗмқ„ мң„н•ҙ SDK 36 н•„мҡ”
    compileSdk = 36
    ndkVersion = "27.0.12077973"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
        encoding = "UTF-8"
        coreLibraryDesugaringEnabled = true
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17.toString()
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.devground.daegubus"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = flutter.minSdkVersion
        // Android 16 Live Updates м§Җмӣҗмқ„ мң„н•ҙ targetSdk 36 н•„мҡ”
        targetSdk = 36
        versionCode = flutter.versionCode
        versionName = flutter.versionName
        // multidex нҷңм„ұнҷ” (н•„мҡ”н•ң кІҪмҡ°)
        multiDexEnabled true
        buildConfigField "String", "KAKAO_NATIVE_APP_KEY", "\"${kakaoNativeAppKey}\""
        manifestPlaceholders = [ADMOB_APP_ID: admobAppId ?: "", KAKAO_NATIVE_APP_KEY: kakaoNativeAppKey ?: ""]
    }

    signingConfigs {
        release {
            if (isReleaseTask) {
                keyAlias releaseSigningConfig.keyAlias
                keyPassword releaseSigningConfig.keyPassword
                storeFile file(releaseSigningConfig.storeFile)
                storePassword releaseSigningConfig.storePassword
            }
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            // localFastRelease=true лЎң л№Ңл“ң мӢң лЎңм»¬ лҰҙлҰ¬мҠӨ мҶҚлҸ„ мҡ°м„ (мҪ”л“ң м¶•мҶҢ/лӮңлҸ…нҷ” мғқлһө)
            minifyEnabled !localFastRelease
            shrinkResources !localFastRelease
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            
            // R8 лҸҷмһ‘ л°©мӢқ мҷ„нҷ” м„Өм • м¶”к°Җ
            crunchPngs false // PNG мөңм Ғнҷ” л№„нҷңм„ұнҷ”
            
            buildConfigField "boolean", "ENABLE_LOGGING", "false"
            buildConfigField "boolean", "ENABLE_LOGS", "false"
            ndk {
                abiFilters 'armeabi-v7a', 'arm64-v8a'
            }
        }
        
        debug {
            buildConfigField "boolean", "ENABLE_LOGGING", "true"
            ndk {
                // мӢӨкё°кё°мҡ© м•„нӮӨн…ҚмІҳл§Ң л№Ңл“ң (x86_64 м ңмҷё вҶ’ CMake л№Ңл“ң 1к°ң к°җмҶҢ)
                abiFilters 'armeabi-v7a', 'arm64-v8a'
            }
        }
    }

    buildFeatures {
        buildConfig true
    }
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'
    // кё°мЎҙ мқҳмЎҙм„ұ мң м§Җ
    
    // Retrofitкіј OkHttp
    implementation 'com.squareup.retrofit2:retrofit:2.9.0'
    implementation 'com.squareup.retrofit2:converter-gson:2.9.0'
    implementation 'com.squareup.okhttp3:okhttp:4.10.0'
    implementation 'com.squareup.okhttp3:logging-interceptor:4.10.0'
    
    // JSON мІҳлҰ¬
    implementation 'com.google.code.gson:gson:2.11.0'
    
    // HTML нҢҢмӢұ
    implementation 'org.jsoup:jsoup:1.15.3'
    
    // мҪ”лЈЁнӢҙ
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.6.4'
    
    // R8 мҳӨлҘҳ н•ҙкІ°мқ„ мң„н•ң androidx.window кҙҖл Ё мқҳмЎҙм„ұ
    implementation 'androidx.window:window:1.0.0'

    // нҸ¬к·ёлқјмҡҙл“ң м„ңл№„мҠӨ л°Ҹ м•ҢлҰјмқ„ мң„н•ң androidx мў…мҶҚм„ұ (Android 16 Live Updates м§Җмӣҗ)
    implementation 'androidx.core:core-ktx:1.17.0'

    // WorkManager
    implementation "androidx.work:work-runtime-ktx:2.8.1"

    // м¶”к°Җлҗң мў…мҶҚм„ұ
    implementation 'androidx.window:window-java:1.0.0'

    // Multidex м§Җмӣҗ м¶”к°Җ (н•„мҡ”н•ң кІҪмҡ°)
    implementation 'androidx.multidex:multidex:2.0.1'

    // Material Design (1.12.0: edge-to-edge мҷ„м „ м§Җмӣҗ, deprecated setStatusBarColor м ңкұ°)
    implementation 'com.google.android.material:material:1.12.0'

}

flutter {
    source = "../.."
}
