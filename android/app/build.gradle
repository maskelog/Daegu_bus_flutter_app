plugins {
    id "com.android.application"
    id "kotlin-android"
    id "kotlin-parcelize"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def localFastRelease = (project.findProperty("localFastRelease")?.toString() ?: "false").toBoolean()

def keyPropertiesFile = rootProject.file("key.properties")
def keyProperties = new java.util.Properties()
if (keyPropertiesFile.exists()) {
    keyProperties.load(new java.io.FileInputStream(keyPropertiesFile))
}

def isReleaseTask = gradle.startParameter.taskNames.any { task ->
    task.toLowerCase().contains("release")
}

def admobAppId = project.findProperty("ADMOB_APP_ID")?.toString()?.trim()
        ?: keyProperties["ADMOB_APP_ID"]?.toString()?.trim()
        ?: keyProperties["admobAppId"]?.toString()?.trim()
if (!isReleaseTask && (admobAppId == null || admobAppId.trim().isEmpty())) {
    admobAppId = "ca-app-pub-3940256099942544~3347511713"
}

def releaseSigningConfig = [
    storeFile: (project.findProperty("STORE_FILE")
            ?: keyProperties["storeFile"]
            ?: keyProperties["STORE_FILE"])?.toString()?.trim(),
    storePassword: (project.findProperty("STORE_PASSWORD")
            ?: keyProperties["storePassword"]
            ?: keyProperties["STORE_PASSWORD"])?.toString()?.trim(),
    keyAlias: (project.findProperty("KEY_ALIAS")
            ?: keyProperties["keyAlias"]
            ?: keyProperties["KEY_ALIAS"])?.toString()?.trim(),
    keyPassword: (project.findProperty("KEY_PASSWORD")
            ?: keyProperties["keyPassword"]
            ?: keyProperties["KEY_PASSWORD"])?.toString()?.trim(),
]
if (isReleaseTask && (admobAppId == null || admobAppId.trim().isEmpty())) {
    throw new GradleException("ë¦´ë¦¬ى¦ˆ ë¹Œë“œ requires ADMOB_APP_ID to be set (gradle property or android/key.properties).")
}
if (isReleaseTask) {
    releaseSigningConfig.each { prop, value ->
        if (value == null || value.trim().isEmpty()) {
            throw new GradleException("ë¦´ë¦¬ى¦ˆ ë¹Œë“œ requires ${prop} (gradle property or android/key.properties).")
        }
    }
}

android {
    namespace = "com.example.daegu_bus_app"
    // Android 16 Live Updates ى§€ى›گى‌„ ىœ„ي•´ SDK 36 ي•„ىڑ”
    compileSdk = 36
    ndkVersion = "27.0.12077973"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
        encoding = "UTF-8"
        coreLibraryDesugaringEnabled = true
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.daegubus.daegu_bus_app"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = flutter.minSdkVersion
        // Android 16 Live Updates ى§€ى›گى‌„ ىœ„ي•´ targetSdk 36 ي•„ىڑ”
        targetSdk = 36
        versionCode = flutter.versionCode
        versionName = flutter.versionName
        // multidex ي™œى„±ي™” (ي•„ىڑ”ي•œ ê²½ىڑ°)
        multiDexEnabled true
        buildConfigField "String", "KAKAO_NATIVE_APP_KEY", "\"\""
        manifestPlaceholders = [ADMOB_APP_ID: admobAppId ?: ""]
    }

    signingConfigs {
        release {
            if (isReleaseTask) {
                keyAlias releaseSigningConfig.keyAlias
                keyPassword releaseSigningConfig.keyPassword
                storeFile file(releaseSigningConfig.storeFile)
                storePassword releaseSigningConfig.storePassword
            }
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            // localFastRelease=true ë،œ ë¹Œë“œ ى‹œ ë،œى»¬ ë¦´ë¦¬ىٹ¤ ى†چëڈ„ ىڑ°ى„ (ى½”ë“œ ى¶•ى†Œ/ë‚œëڈ…ي™” ىƒ‌ë‍µ)
            minifyEnabled !localFastRelease
            shrinkResources !localFastRelease
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            
            // R8 ëڈ™ى‍‘ ë°©ى‹‌ ى™„ي™” ى„¤ى • ى¶”ê°€
            crunchPngs false // PNG ىµœى پي™” ë¹„ي™œى„±ي™”
            
            buildConfigField "boolean", "ENABLE_LOGGING", "false"
            buildConfigField "boolean", "ENABLE_LOGS", "true"
            ndk {
                abiFilters 'armeabi-v7a', 'arm64-v8a'
            }
        }
        
        debug {
            buildConfigField "boolean", "ENABLE_LOGGING", "true"
            ndk {
                // ى‹¤ê¸°ê¸°ىڑ© ى•„ي‚¤ي…چى²کë§Œ ë¹Œë“œ (x86_64 ى œى™¸ â†’ CMake ë¹Œë“œ 1ê°œ ê°گى†Œ)
